<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HUMA · Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream:    '#F7F3EE',
            bark:     '#C8A882',
            charcoal: '#2A2A2A',
            mist:     '#E8E2D9',
            ink:      '#1A1A1A',
          },
          fontFamily: {
            display: ['Cormorant Garamond', 'Georgia', 'serif'],
            body:    ['DM Sans', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    body { background: #F7F3EE; font-family: 'DM Sans', system-ui, sans-serif; }
    input, textarea { outline: none; }
    input:focus, textarea:focus { box-shadow: 0 0 0 2px #C8A882; }
    .field-label { @apply block text-xs font-medium tracking-widest uppercase text-charcoal/50 mb-1; }
    .field-input {
      width: 100%;
      border: 1px solid #E8E2D9;
      background: #fff;
      border-radius: 2px;
      padding: 0.55rem 0.75rem;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 0.875rem;
      color: #2A2A2A;
      transition: border-color .15s;
    }
    .field-input:focus { border-color: #C8A882; }
    #tableWrap { overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; min-width: 750px; }
    th { background: #F7F3EE; }
    tr:last-child td { border-bottom: none; }
  </style>
</head>
<body class="min-h-screen text-charcoal">

  <nav class="sticky top-0 z-30 border-b border-mist bg-cream/90 backdrop-blur">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="font-display text-2xl font-light tracking-[.18em]">HUMA</span>
        <span class="hidden sm:inline text-charcoal/30 text-sm">·</span>
        <span class="hidden sm:inline font-body text-xs tracking-widest uppercase text-charcoal/40">Panel de administración</span>
      </div>
      <a href="index.html"
        class="font-body text-xs tracking-widest uppercase text-charcoal/50 hover:text-bark transition-colors flex items-center gap-1.5">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        Ver tienda
      </a>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-4 py-10 space-y-10">

    <section class="bg-white border border-mist rounded-sm p-6 md:p-8">
      <div class="flex items-center justify-between mb-6">
        <h1 id="formTitle" class="font-display text-2xl font-light tracking-wide">Nuevo producto</h1>
        <button id="clearFormBtn"
          class="font-body text-xs tracking-widest uppercase text-charcoal/40 hover:text-bark transition-colors">
          Limpiar
        </button>
      </div>

      <form id="adminForm" novalidate class="space-y-5">
        <input type="hidden" id="field_id" />
        <input type="hidden" id="field_estado" value="" />

        <div>
          <label for="field_nombre" class="field-label">Nombre <span class="text-bark">*</span></label>
          <input id="field_nombre" type="text" class="field-input" placeholder="Ej: Remera lino crudo" required />
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
          <div>
            <label for="field_precio" class="field-label">Precio <span class="text-bark">*</span></label>
            <input id="field_precio" type="number" min="0" step="0.01" class="field-input" placeholder="Ej: 18500" required />
          </div>
          <div>
            <label class="field-label">ID del producto</label>
            <div class="flex gap-2">
              <input id="field_id_visible" type="text" class="field-input flex-1"
                placeholder="Se genera automáticamente"
                oninput="document.getElementById('field_id').value = this.value.trim()" />
              <button type="button" id="generateIdBtn"
                title="Generar ID automático"
                class="shrink-0 border border-mist px-3 rounded-sm text-charcoal/40 hover:border-bark hover:text-bark transition-colors text-lg leading-none">
                ↻
              </button>
            </div>
          </div>
        </div>

        <div>
          <label for="field_descripcion" class="field-label">Descripción</label>
          <textarea id="field_descripcion" rows="3" class="field-input resize-none"
            placeholder="Ej: Prenda de algodón 100%..."></textarea>
        </div>

        <div>
          <label for="field_imagenes" class="field-label">Imágenes</label>
          <input id="field_imagenes" type="text" class="field-input"
            placeholder="Ej: remera1.jpg, remera2.jpg" />
        </div>

        <div class="flex flex-col sm:flex-row sm:items-center gap-3 pt-1">
          <button id="submitBtn" type="submit"
            class="bg-charcoal text-cream font-body text-xs tracking-widest uppercase px-6 py-3
                   hover:bg-bark transition-colors duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
            Guardar producto
          </button>
          <p id="adminMsg" class="font-body text-sm"></p>
        </div>
      </form>
    </section>

    <section class="bg-white border border-mist rounded-sm">
      <div class="flex items-center justify-between px-6 py-4 border-b border-mist">
        <h2 class="font-display text-xl font-light tracking-wide">Productos en catálogo</h2>
        <button id="refreshBtn"
          class="flex items-center gap-1.5 font-body text-xs tracking-widest uppercase text-charcoal/40 hover:text-bark transition-colors">
          Actualizar
        </button>
      </div>

      <div id="tableWrap">
        <table>
          <thead>
            <tr class="text-left text-[11px] font-body font-medium tracking-widest uppercase text-charcoal/40">
              <th class="px-4 py-3 border-b border-mist">ID</th>
              <th class="px-4 py-3 border-b border-mist">Nombre</th>
              <th class="px-4 py-3 border-b border-mist">Precio</th>
              <th class="px-4 py-3 border-b border-mist">Estado</th>
              <th class="px-4 py-3 border-b border-mist">Descripción</th>
              <th class="px-4 py-3 border-b border-mist">Imágenes</th>
              <th class="px-4 py-3 border-b border-mist text-right">Acciones</th>
            </tr>
          </thead>
          <tbody id="adminTableBody">
            <tr>
              <td colspan="7" class="px-4 py-10 text-center font-body text-sm text-charcoal/30">
                Cargando productos…
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
  <script>
    // URL LOCAL INTERNA PARA EVITAR CONFLICTOS DE ENTRADA
    const LOCAL_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT26n3U0sniaztj-nS4Qm8iro_fAvED2sQ5BLB7jlVE-NY0byZNmCJfBaiOQEm7qIFKxTkBNeohLwGI/pub?output=csv";
    const LOCAL_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxccGfv-jhftv2il90Uisbe_idJTZy-AOvBIwha45YYsbRl_5GcNOMD6UwUAQChOVfzfw/exec";

    const fieldIdVisible = document.getElementById('field_id_visible');
    const fieldIdHidden  = document.getElementById('field_id');

    document.getElementById('generateIdBtn').addEventListener('click', () => {
      const newId = 'p' + Date.now();
      fieldIdHidden.value  = newId;
      fieldIdVisible.value = newId;
    });

    // PARSER LOCAL AUTOMÁTICO
    function localParseCSV(text) {
      const lines = text.trim().split('\n');
      if (lines.length < 2) return [];
      
      const splitLine = (line) => {
        const res = []; let cur = ''; let q = false;
        for (let i=0; i<line.length; i++) {
          if (line[i] === '"') q = !q;
          else if (line[i] === ',' && !q) { res.push(cur.trim().replace(/^"|"$/g, '')); cur = ''; }
          else cur += line[i];
        }
        res.push(cur.trim().replace(/^"|"$/g, ''));
        return res;
      };

      const headers = splitLine(lines[0]);
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const vals = splitLine(lines[i]);
        if (vals.length === 0 || (vals.length === 1 && vals[0] === "")) continue;
        const obj = {};
        headers.forEach((h, idx) => { obj[h.trim()] = vals[idx] ? vals[idx].trim() : ''; });
        rows.push(obj);
      }
      return rows;
    }

    window.loadAdminProducts = async function() {
      const tbody = document.getElementById('adminTableBody');
      if (!tbody) return;

      try {
        const res  = await fetch(LOCAL_SHEET_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const rows = localParseCSV(await res.text());

        tbody.innerHTML = rows.map(p => {
          const isOculto = p.estado?.toLowerCase().trim() === 'oculto';
          const badgeColor = isOculto ? 'bg-gray-100 text-gray-500' : 'bg-green-50 text-green-700 border border-green-200/50';
          const badgeText = isOculto ? 'Oculto' : 'Visible';
          
          const toggleActionBtn = isOculto 
            ? `<button onclick="toggleProductVisibility(${JSON.stringify(p).replace(/"/g, '&quot;')}, 'mostrar')" class="text-xs bg-green-50 text-green-700 hover:bg-green-100 px-2 py-1 rounded transition-colors">👁️ Mostrar</button>`
            : `<button onclick="toggleProductVisibility(${JSON.stringify(p).replace(/"/g, '&quot;')}, 'ocultar')" class="text-xs bg-amber-50 text-amber-700 hover:bg-amber-100 px-2 py-1 rounded transition-colors">👁️‍🗨️ Ocultar</button>`;

          return `
            <tr class="border-b border-gray-100 hover:bg-gray-50/50 transition-colors">
              <td class="px-4 py-3 text-sm font-mono text-gray-500">${p.id}</td>
              <td class="px-4 py-3 text-sm font-medium">${p.nombre}</td>
              <td class="px-4 py-3 text-sm font-medium">$${parseFloat(p.precio || 0).toLocaleString('es-AR')}</td>
              <td class="px-4 py-3 text-sm">
                <span class="inline-block text-[11px] font-medium px-2 py-0.5 rounded-full ${badgeColor}">${badgeText}</span>
              </td>
              <td class="px-4 py-3 text-sm text-gray-400 max-w-[180px] truncate">${p.descripcion || '—'}</td>
              <td class="px-4 py-3 text-sm text-gray-400 max-w-[120px] truncate">${p.imagenes || '—'}</td>
              <td class="px-4 py-3 text-right">
                <div class="flex items-center justify-end gap-1.5">
                  ${toggleActionBtn}
                  <button onclick="fillAdminForm(${JSON.stringify(p).replace(/"/g, '&quot;')})" class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded">Editar</button>
                  <button onclick="deleteProduct('${p.id}')" class="text-xs bg-red-50 text-red-600 hover:bg-red-100 px-2 py-1 rounded">Eliminar</button>
                </div>
              </td>
            </tr>
          `;
        }).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" class="px-4 py-6 text-center text-red-600">Error: ${err.message}</td></tr>`;
      }
    };

    window.toggleProductVisibility = async function(producto, accion) {
      const msg = document.getElementById('adminMsg');
      if (msg) { msg.textContent = 'Actualizando visibilidad…'; msg.className = 'text-charcoal/60 text-sm animate-pulse'; }
      
      const payload = {
        action: 'save',
        id: producto.id,
        nombre: producto.nombre,
        precio: producto.precio,
        descripcion: producto.descripcion || '',
        imagenes: producto.imagenes || '',
        estado: accion === 'ocultar' ? 'oculto' : ''
      };

      try {
        await fetch(LOCAL_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (msg) { msg.textContent = '✓ Cambios aplicados con éxito.'; msg.className = 'text-green-600 text-sm font-medium'; }
        setTimeout(loadAdminProducts, 1500);
      } catch (err) {
        if (msg) { msg.textContent = 'Error: ' + err.message; msg.className = 'text-red-600 text-sm'; }
      }
    };

    // Sobrecarga de sincronización nativa de IDs
    const _origFillAdminForm = window.fillAdminForm;
    window.fillAdminForm = function(p) {
      if (typeof _origFillAdminForm === 'function') _origFillAdminForm(p);
      else {
        ['id', 'nombre', 'precio', 'descripcion', 'imagenes', 'estado'].forEach(k => {
          const el = document.getElementById('field_' + k); if (el) el.value = p[k] || '';
        });
        document.getElementById('formTitle').textContent = 'Editar producto';
        document.getElementById('submitBtn').textContent = 'Actualizar producto';
      }
      fieldIdVisible.value = fieldIdHidden.value;
    };

    document.getElementById('refreshBtn').addEventListener('click', loadAdminProducts);

    document.addEventListener('DOMContentLoaded', () => {
      if (!fieldIdHidden.value) {
        const newId = 'p' + Date.now();
        fieldIdHidden.value  = newId;
        fieldIdVisible.value = newId;
      }
      setTimeout(loadAdminProducts, 500);
    });
  </script>
</body>
</html>
